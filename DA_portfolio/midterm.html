<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Midterm Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body {
      font-family: 'Pixelify Sans', sans-serif;
      color: orange;
      padding-top: 80px;
      position: relative;
      background-color: #0d0f18;
    }

    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      opacity: 1;
    }

    .bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }

    .navbar {
      background: rgba(0,0,0,0.8);
      border-bottom: 4px solid lime;
      backdrop-filter: blur(5px);
    }

    .navbar-brand {
      font-size: 24px;
      color: lime !important;
      text-shadow: 2px 2px 0 blue;
    }

    .nav-link {
      color: white !important;
      margin: 0 10px;
      position: relative;
      font-size: 18px;
    }

    .nav-link:hover {
      color: lime !important;
    }

    .section {
      padding: 80px 0;
      background: rgba(13, 15, 24, 0.85);
      backdrop-filter: blur(2px);
      border-bottom: 4px dashed blue;
    }

    .section-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 40px;
      color: lime;
      text-shadow: 4px 4px 0 blue;
    }

    .hero-section {
      padding: 120px 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .profile-img-container {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .profile-img {
      width: 100%;
      max-width: 350px;
      height: auto;
      border: 4px solid lime;
      box-shadow: 8px 8px 0 blue;
      image-rendering: pixelated;
    }

    .name {
      color: lime;
      font-weight: bold;
    }

    .btnn {
      background: lime;
      color: black;
      border: none;
      border-radius: 0;
      padding: 12px 30px;
      font-size: 18px;
      box-shadow: 4px 4px 0 #000;
      transition: all 0.1s;
      text-transform: uppercase;
    }

    .btnn:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000;
      color: blue;
    }

    .skill-card {
      background: rgba(0,0,0,0.7);
      border: 4px solid blue;
      padding: 25px;
      margin-bottom: 20px;
      height: 100%;
      transition: all 0.3s;
    }

    .skill-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 lime;
    }

    .pixel-progress {
      height: 20px;
      background-color: #2a2e3d;
      border: 2px solid lime;
      border-radius: 0;
      margin-bottom: 20px;
    }

    .pixel-progress .progress-bar {
      background-color: lime;
      box-shadow: 2px 0 0 #000;
      width: 0;
      transition: width 1.5s ease-out !important;
    }

    .skill-percent {
      display: inline-block;
      min-width: 40px;
      text-align: right;
    }

    .pixel-badge {
      display: inline-block;
      background-color: blue;
      color: white;
      padding: 8px 15px;
      margin: 0 8px 10px 0;
      border: 2px solid lime;
      font-size: 16px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .pixel-badge:hover {
      background-color: lime;
      color: black;
      transform: translate(-3px, -3px);
      box-shadow: 4px 4px 0 blue;
    }

    .project-card {
      background: rgba(0,0,0,0.7);
      border: 4px solid blue;
      margin-bottom: 30px;
      transition: all 0.2s;
      overflow: hidden;
      height: 100%;
    }

    .project-card:hover {
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 lime;
    }

    .project-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-bottom: 4px solid blue;
      transition: transform 0.3s;
    }

    .project-card:hover .project-img {
      transform: scale(1.10);
    }

    .project-info {
      padding: 20px;
    }

    .pixel-form {
      background: rgba(0,0,0,0.7);
      border: 4px solid lime;
      padding: 30px;
    }

    .pixel-input {
      width: 100%;
      background: #1a1e2d;
      border: 2px solid blue;
      color: white;
      padding: 12px;
      font-family: 'Pixelify Sans', sans-serif;
      margin-bottom: 5px;
      font-size: 16px;
    }

    .pixel-input:focus {
      outline: none;
      border-color: lime;
      box-shadow: 0 0 0 2px rgba(0, 255, 0, 0.3);
    }

    .invalid-feedback {
      color: #ff3366;
      font-size: 14px;
      display: none;
    }

    .was-validated .pixel-input:invalid {
      border-color: #ff3366;
    }

    .was-validated .pixel-input:invalid ~ .invalid-feedback {
      display: block;
    }

    .social-links {
      margin-top: 30px;
    }

    .social {
      display: inline-block;
      font-size: 32px;
      color: lime;
      margin: 0 15px;
      transition: all 0.3s;
      text-shadow: 2px 2px 0 blue;
    }

    .social:hover {
      color: yellow;
      transform: translateY(-5px) scale(1.2);
      text-shadow: 3px 3px 0 blue;
    }

    .pixel-footer {
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 30px 0;
      border-top: 4px solid lime;
      text-align: center;
    }

    .pixel-footer p {
      margin-bottom: 5px;
      font-size: 16px;
    }

    @media (max-width: 768px) {
      .section-title {
        font-size: 24px;
      }
      .profile-img {
        width: 200px;
        height: 200px;
        margin-bottom: 30px;
      }
      .hero-section {
        padding: 80px 0;
        text-align: center;
      }
      .btnn {
        width: 100%;
        margin-bottom: 10px;
      }
    }
  </style>
</head>


<body>
  <div class="bg-container">
    <img src="https://i.pinimg.com/originals/56/57/7e/56577e48acdd6b57a6cbb3a07547a36c.gif" class="bg">
  </div>
  <nav class="navbar navbar-expand-lg navbar-light fixed-top">
    <div class="container">
      <a class="navbar-brand" href="#">
        <i class="bi bi-joystick"></i> SEAN_LLUZ
      </a>
    </div>
  </nav>
  <section>  
    <div class="col-md-4">
      <div class="project-card">
        <img src="https://raw.githubusercontent.com/sjclluz0802/portfolio/20c97c2f1b050ad652a859338f9e6171f36c10b1/images/midtask%20preview.png" class="project-img">
        <div class="project-info">
          <h4>Midterm Lab Task 1. Data Cleaning and Preparation</h4>
          <div class="d-flex gap-2">
          <a href="midterm.html" class="btn btnn btn-sm" target="_blank" rel="noopener noreferrer">VIEW</a>
          </div>
        </div>
      </div>
    </div>
</section>

<section>
  <div class="col-md-4">
    <div class="project-card">
      <img src="https://raw.githubusercontent.com/sjclluz0802/portfolio/20c97c2f1b050ad652a859338f9e6171f36c10b1/images/midtask%20preview.png" class="project-img">
      <div class="project-info">
        <h4>MIDTERM TASKS</h4>
        <div class="d-flex gap-2">
        <a href="midterm.html" class="btn btnn btn-sm" target="_blank" rel="noopener noreferrer">VIEW</a>
        </div>
      </div>
    </div>
  </div>

</section>

</div>
</body>
